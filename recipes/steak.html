<body>
    <h1>Steak Recipe</h1>
    <img src="../images/steak.jpg" alt="Steak" width="300">
    <p>This is a simple steak recipe.</p>
    <h2>Ingredients</h2>
    <ul>
        <li>2 steaks</li>
        <li>Salt and pepper</li>
        <li>1 tablespoon oil</li>
    </ul>
    <h2>Instructions</h2>
    <ol>
        <li>Season the steaks with salt and pepper.</li>
        <li>Heat the oil in a skillet over high heat.</li>
        <li>Cook the steaks for 4-5 minutes on each side.</li>
    </ol>
